    <style>
        /* Configurações de estilo geral */
        body {
            background-color: #000; /* Fundo preto */
            color: #00FF00; /* Texto verde, como no terminal */
            font-family: "Courier New", Courier, monospace; /* Fonte de terminal */
            margin: 0;
            padding: 20px;
        }

        /* Estilo do título */
        h1 {
            color: #00FF00; /* Verde brilhante */

            color: #00FF00;
            text-decoration: none;
            display: block;
            margin: 10px 0;
            padding: 5px;

        }

</head>

    <div class="posts">
        <h1>Golang</h1>
